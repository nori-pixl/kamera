<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xperia AI - Python Bridge</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; }
        .viewport { position: relative; flex: 1; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; transition: transform 0.1s; }
        #aiOverlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .ui-panel { width: 95px; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); display: flex; flex-direction: column; align-items: center; justify-content: space-around; z-index: 200; border-left: 1px solid #333; }
        .mode-btn { width: 75px; padding: 10px 0; border: 1px solid #555; background: #222; color: #fff; border-radius: 5px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .mode-btn.active { border-color: #00e5ff; color: #00e5ff; }
        .shutter { width: 65px; height: 65px; background: #fff; border: 5px solid #333; border-radius: 50%; cursor: pointer; }
        input[type="range"] { -webkit-appearance: slider-vertical; height: 180px; width: 30px; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div class="viewport">
        <video id="v" autoplay playsinline muted></video>
        <div id="aiOverlay">
            <div style="width:40px; height:40px; border:3px solid #00e5ff; border-top-color:transparent; border-radius:50%; animation:spin 1s linear infinite;"></div>
            <p id="statusText" style="color:#00e5ff; margin-top:20px; font-size:11px; text-align:center;">AI PROCESSING VIA PYTHON...</p>
        </div>
    </div>

    <div class="ui-panel">
        <div onclick="toggleSettings()" style="cursor:pointer; color:#666; font-size:10px;">⚙ KEY</div>
        <button id="aiToggle" class="mode-btn active">AI: ON</button>
        <div style="text-align:center"><div id="zl" style="color:#00e5ff; font-weight:bold;">1.0x</div><input type="range" id="zs" min="1" max="10" step="0.1" value="1"></div>
        <button class="shutter" id="sh"></button>
    </div>

    <script>
        const v = document.getElementById('v'), zs = document.getElementById('zs'), zl = document.getElementById('zl'),
              sh = document.getElementById('sh'), aiToggle = document.getElementById('aiToggle'),
              overlay = document.getElementById('aiOverlay'), statusText = document.getElementById('statusText');

        let isAiOn = true;
        let pubKey = localStorage.getItem('ilove_key') || '';

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280 } }).then(s => v.srcObject = s);
        zs.oninput = () => { zl.innerText = parseFloat(zs.value).toFixed(1) + "x"; v.style.transform = `scale(${zs.value})`; };
        aiToggle.onclick = () => { isAiOn = !isAiOn; aiToggle.classList.toggle('active'); aiToggle.innerText = isAiOn ? "AI: ON" : "AI: OFF"; };
        function toggleSettings() { const k = prompt("Public Keyを入力:", pubKey); if(k){ pubKey=k; localStorage.setItem('ilove_key', k); } }

        sh.onclick = async () => {
            const c = document.createElement('canvas');
            const ctx = c.getContext('2d');
            const z = parseFloat(zs.value);
            c.width = v.videoWidth; c.height = v.videoHeight;
            ctx.drawImage(v, (c.width-c.width/z)/2, (c.height-c.height/z)/2, c.width/z, c.height/z, 0, 0, c.width, c.height);

            if (!isAiOn) { download(c.toDataURL("image/jpeg"), "normal.jpg"); return; }
            if (!pubKey) { alert("⚙からKeyを設定してください"); return; }

            overlay.style.display = 'flex';
            statusText.innerText = "PYTHON BRIDGE PROCESSING...";

            try {
                const blob = await new Promise(r => c.toBlob(r, 'image/jpeg', 0.9));
                const formData = new FormData();
                formData.append('public_key', pubKey);
                formData.append('image', blob);

                // Pythonサーバーへリクエスト
                const res = await fetch('http://localhost:5000/ai-process', {
                    method: 'POST',
                    body: formData
                });

                if (!res.ok) throw new Error("Server Error");

                const resultBlob = await res.blob();
                download(URL.createObjectURL(resultBlob), "AI_Xperia_Pro.jpg");
            } catch (e) {
                alert("接続エラー: Pythonサーバーを起動しているか確認してください。");
            } finally {
                overlay.style.display = 'none';
            }
        };

        function download(url, name) { const a = document.createElement('a'); a.href = url; a.download = name; a.click(); }
    </script>
    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
</body>
</html>
